---
- name: Backing up /etc/sysctl.conf
  copy:
    src: /etc/sysctl.conf
    dest: /etc/sysctl.conf.bkp
    mode: 0640
    owner: root
    group: root
    remote_src: true

- name: Backup /etc/sysctl.d
  command: >
    tar -czf /etc/sysctl.d_{{ ansible_date_time.date }}.tar.gz /etc/sysctl.d
  changed_when: true
