# /etc/sysctl.d/30-kernel-protection.conf

############################################################
# Kernel Information Protection
# Purpose:
#   Reduce information leakage from the kernel
#   and restrict process inspection capabilities.
############################################################

# Restrict access to kernel logs (dmesg).
# Prevent unprivileged users from viewing kernel messages.
kernel.dmesg_restrict = 1

# Restrict ptrace usage.
# Prevent one process from tracing another user's process.
kernel.yama.ptrace_scope = 1

# Hide kernel pointer addresses.
# Reduces usefulness of kernel memory leaks.
kernel.kptr_restrict = 2
