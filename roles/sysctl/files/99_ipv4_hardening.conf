# /etc/sysctl.d/10-network-hardening.conf

############################################################
# Network Stack Hardening
# Purpose:
#   Reduce spoofing, MITM attacks, routing abuse,
#   and TCP denial-of-service attacks.
############################################################

# Disable IPv4 packet forwarding.
# Prevents the system from acting as a router.
net.ipv4.ip_forward = 0

# Disable source-routed packets.
# Prevent attackers from specifying packet paths.
net.ipv4.conf.all.accept_source_route = 0
net.ipv4.conf.default.accept_source_route = 0

# Disable ICMP redirect acceptance.
# Prevent malicious route manipulation attacks.
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0

# Disable secure ICMP redirects.
# Even redirects from trusted gateways are ignored.
net.ipv4.conf.all.secure_redirects = 0
net.ipv4.conf.default.secure_redirects = 0

# Disable sending ICMP redirects.
# Server should not advertise alternate routes.
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0

# Enable SYN cookies.
# Helps mitigate SYN flood denial-of-service attacks.
net.ipv4.tcp_syncookies = 1

# Log suspicious packets (martians).
# Useful for detecting spoofing or malformed traffic.
net.ipv4.conf.all.log_martians = 1
