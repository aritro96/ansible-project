# /etc/sysctl.d/20-ipv6-hardening.conf

############################################################
# IPv6 Exposure Reduction
# Purpose:
#   Disable IPv6 if not required in the environment.
#
# WARNING:
#   Do NOT disable IPv6 blindly in production.
#   Can affect Kubernetes, cloud networking,
#   monitoring agents, and modern applications.
############################################################

# Disable IPv6 on all interfaces.
net.ipv6.conf.all.disable_ipv6 = 1
