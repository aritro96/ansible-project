---
- name: Copying identity and authentication rules
  copy:
    src: "{{ item }}"
    dest: /etc/audit/rules.d/
    mode: 0640
    owner: root
    group: root
  loop:
    - identity_and_authentication.rules
    - kernel_and_module.rules
    - priviledge_escalation.rules
    - sys_config.rules
  notify: "Load augen rules"

- name: Check if rules have correct syntax
  command: augenrules --check
  register: augenrules_check
  changed_when: false
