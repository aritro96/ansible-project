---
- name: Backing up auditd.conf
  copy:
    src: /etc/audit/auditd.conf
    dest: /etc/audit/auditd_bkp.conf
    remote_src: true
    mode: 0640
    owner: root
    group: root

- name: Backing up the rules.d/
  copy:
    src: /etc/audit/rules.d
    dest: "/tmp/auditrules_dir_{{ ansible_date_time.iso8601 }}"
    remote_src: true
    mode: 0640
    owner: root
    group: root
