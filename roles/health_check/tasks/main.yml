- name: Generate consolidated report
  template:
    src: consolidated_report.html.j2
    dest: "/tmp/health_report.html"
  delegate_to: localhost
  run_once: true
  
- name: Send consolidated health check report
  shell: |
    (
      echo "Subject: Server Health Check Report"
      echo "To: aritro.rmc@gmail.com"
      echo "MIME-Version: 1.0"
      echo "Content-Type: text/html"
      echo ""
      cat /tmp/health_report.html
    ) | /usr/sbin/sendmail -t
  delegate_to: localhost
  run_once: true
