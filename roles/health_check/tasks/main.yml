---
- name: Import CPU checks
  import_tasks: cpu.yml

- name: Import Memory checks
  import_tasks: mem.yml

- name: Import Disk checks
  import_tasks: disk.yml

- name: Import NTP checks
  import_tasks: ntp.yml

- name: Check services
  include_tasks: service.yml
  loop: "{{ services }}"

